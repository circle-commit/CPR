<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency CPR Guide</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #status { font-size: 1.5rem; margin-bottom: 20px; color: #ff4d4d; font-weight: bold; }
        #visual-guide { width: 200px; height: 200px; border-radius: 50%; background-color: #333; margin: 20px auto; border: 10px solid #555; transition: 0.1s; }
        .active { background-color: #ff0000 !important; transform: scale(1.1); box-shadow: 0 0 30px #ff0000; }
        button { padding: 20px 40px; font-size: 1.2rem; cursor: pointer; background: #ff4d4d; color: white; border: none; border-radius: 10px; font-weight: bold; }
        .info { margin-top: 30px; font-size: 0.9rem; color: #ccc; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>🚨 응급 CPR 가이드</h1>
    <div id="status">박자에 맞춰 압박하세요!</div>
    
    <div id="visual-guide"></div>
    
    <button onclick="startCPR()">CPR 시작 (음성/박자)</button>

    <div class="info">
        <p>1. 119 신고 확인<br>
        2. 가슴 중앙을 5~6cm 깊이로 압박<br>
        3. 분당 100~120회 속도 유지</p>
    </div>

    <script>
    let audioCtx;
    let isRunning = false;
    let compressionCount = 0;

    // 1. 페이지 로드 시점에 목소리 목록을 미리 로드 (브라우저 최적화)
    const synth = window.speechSynthesis;

    async function startCPR() {
        if (isRunning) return;
        isRunning = true;
        
        // 2. 오디오 컨텍스트를 사용자 클릭 즉시 생성
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 3. 브라우저의 소리 차단 해제를 위해 빈 음성 하나를 먼저 실행 (매우 중요)
        const silentMsg = new SpeechSynthesisUtterance("");
        synth.speak(silentMsg);

        // 4. 최초 시작 멘트
        await speak("흉부압박을 시작하십시오.");
        
        // 5. 루프 시작
        runCPRCycle();
    }

    function runCPRCycle() {
        const interval = (60 / 110) * 1000;

        const timerId = setInterval(async () => {
            compressionCount++;
            
            playClick();
            visualFlash();

            if (compressionCount >= 30) {
                clearInterval(timerId);
                compressionCount = 0;

                await speak("기도개방을 한 상태로 인공호흡을 시작하세요.");
                
                // 인공호흡 2회 시간을 위해 3초 대기 후 재시작
                setTimeout(() => {
                    runCPRCycle();
                }, 3000); 
            }
        }, interval);
    }

    function speak(text) {
        return new Promise((resolve) => {
            // 기존에 나오던 목소리가 있다면 취소 (엉킴 방지)
            synth.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            msg.rate = 1.1; // 웅얼거리지 않게 속도 살짝 올림
            
            msg.onend = () => {
                resolve();
            };

            // 에러 발생 시에도 루프가 멈추지 않도록 처리
            msg.onerror = () => {
                console.error("TTS 에러 발생");
                resolve();
            };

            synth.speak(msg);
        });
    }

    function playClick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function visualFlash() {
        const guide = document.getElementById('visual-guide');
        guide.classList.add('active');
        setTimeout(() => guide.classList.remove('active'), 100);
    }
    </script>
</body>
</html>
