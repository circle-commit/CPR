<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency CPR Guide</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #status { font-size: 1.5rem; margin-bottom: 10px; color: #ff4d4d; font-weight: bold; }
        
        /* 숫자 표시 스타일 추가 */
        #count-display { font-size: 5rem; font-weight: bold; color: #ffffff; margin: 10px 0; }
        
        #visual-guide { width: 180px; height: 180px; border-radius: 50%; background-color: #333; margin: 10px auto; border: 10px solid #555; transition: 0.1s; position: relative; }
        .active { background-color: #ff0000 !important; transform: scale(1.1); box-shadow: 0 0 30px #ff0000; }
        
        button { padding: 20px 40px; font-size: 1.2rem; cursor: pointer; background: #ff4d4d; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }
        .info { margin-top: 30px; font-size: 0.9rem; color: #ccc; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>🚨 응급 CPR 가이드</h1>
    <div id="status">준비되었습니다.</div>
    
    <div id="count-display">0</div>
    
    <div id="visual-guide"></div>
    
    <button onclick="startCPR()">CPR 시작 (음성/박자)</button>

    <div class="info">
        <p>1. 119 신고 확인<br>
        2. 가슴 중앙을 5~6cm 깊이로 압박<br>
        3. 분당 100~120회 속도 유지</p>
    </div>

    <script>
    let audioCtx;
    let isRunning = false;
    const synth = window.speechSynthesis;
    const countDisplay = document.getElementById('count-display');
    const statusDisplay = document.getElementById('status');

    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    async function startCPR() {
        if (isRunning) return;
        isRunning = true;
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        synth.cancel();

        while (isRunning) {
            statusDisplay.innerText = "가슴 압박 중...";
            await speak("흉부압박을 시작하십시오.");
            
            const interval = (60 / 110) * 1000; 
            for (let i = 1; i <= 30; i++) {
                // 화면에 횟수 업데이트
                countDisplay.innerText = i;
                
                playClick();
                visualFlash();
                await delay(interval);
            }

            statusDisplay.innerText = "인공호흡 단계";
            await speak("기도개방을 한 상태로 인공호흡을 시작하세요.");
            

            // 인공호흡 중에는 숫자를 잠시 멈추거나 0으로 표시
            await delay(15000);
            countDisplay.innerText = "0";
        }
    }

    function speak(text) {
        return new Promise((resolve) => {
            if (synth.paused) synth.resume();
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            msg.rate = 1.2;
            msg.onend = () => resolve();
            msg.onerror = () => { synth.resume(); resolve(); };
            synth.speak(msg);
        });
    }

    function playClick() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function visualFlash() {
        const guide = document.getElementById('visual-guide');
        guide.classList.add('active');
        setTimeout(() => guide.classList.remove('active'), 100);
    }
    </script>
</body>
</html>
